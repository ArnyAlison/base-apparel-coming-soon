<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Apparel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="content">
            <div class="logo">
                <img src="logo.svg" alt="Base Apparel logo">
            </div>
            
            <div class="text">
                <h1>
                    <span class="light">WE'RE</span><br>
                    COMING <br>
                    SOON
                </h1>
                <P>Hello fellow shoppers! We are currently building our new <br>
                   fashion store. Add your email below to stay up-to-date with announcements and our launch deals.
                </P>
            </div>

            <form class="form">
                <input type="email" placeholder="Email Address">
                <button type="submit"><img src="icon-arrow.svg" alt="arrow"></button>

                <P class="error">Please provide a valid email</P>

                <img src="icon-error.svg" class="error-icon" alt="">
            </form>
        </div>

        <div class="hero">
            <img src="hero-desktop.jpg" alt="Fashion model">
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
